<div class="container-header">
    <div class="logo">
        <h1>The Curator</h1>
    </div>

    <div id="main-navigation" class="nav-wrapper" [class.open]="isMobileMenuOpen">
        <div class="list-header">
            <ul>
                <li><a href="#home" (click)="closeMobileMenu()">Home</a></li>
                <li><a href="#features" (click)="closeMobileMenu()">Features</a></li>
                <li><a href="#pricing" (click)="closeMobileMenu()">Pricing</a></li>
                <li><a href="#about" (click)="closeMobileMenu()">About</a></li>
            </ul>
        </div>
    </div>

    <div class="start-buttons" [class.open]="isMobileMenuOpen">
        <button class="sign-in-button" type="button" (click)="closeMobileMenu()">Sign In</button>
        <button class="get-started-button" type="button" (click)="closeMobileMenu()">Get Started</button>
    </div>

    <button
        class="menu-toggle"
        type="button"
        (click)="toggleMobileMenu()"
        [class.open]="isMobileMenuOpen"
        [attr.aria-expanded]="isMobileMenuOpen"
        aria-controls="main-navigation"
        aria-label="Toggle navigation menu"
    >
        <span></span>
        <span></span>
        <span></span>
    </button>
</div>
